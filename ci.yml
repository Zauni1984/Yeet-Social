name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  # ── Rust Backend: Test + Lint ─────────────────────────────────────────────
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yeet_test
          POSTGRES_USER: yeet
          POSTGRES_PASSWORD: test_pw
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://yeet:test_pw@localhost:5432/yeet_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_test_secret_not_for_production
      BSC_RPC_URL: https://bsc-dataseed.binance.org/
      YEET_TOKEN_ADDRESS: "0x0000000000000000000000000000000000000000"
      YEET_NFT_ADDRESS: "0x0000000000000000000000000000000000000000"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install sqlx-cli (for migrations)
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run DB migrations
        run: sqlx migrate run --database-url $DATABASE_URL
        working-directory: backend

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (no warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run backend tests
        run: cargo test --workspace --verbose

      - name: Check sqlx query cache is up to date
        run: cargo sqlx prepare --check --workspace
        working-directory: backend
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ── Rust Frontend: WASM Build ─────────────────────────────────────────────
  frontend:
    name: Frontend (Leptos/WASM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.4.0
        with:
          version: latest

      - name: Build frontend (WASM)
        working-directory: frontend
        run: trunk build --release
        env:
          API_URL: https://api.yeet.social/api/v1

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Solidity Contracts: Forge Tests ──────────────────────────────────────
  contracts:
    name: Smart Contracts (Foundry)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # OpenZeppelin als Git Submodule

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run Forge tests
        working-directory: contracts
        run: |
          forge build --sizes
          forge test -vvv

      - name: Run Slither security analysis
        uses: crytic/slither-action@v0.3.0
        with:
          target: contracts/
          slither-args: "--filter-paths lib/"
        continue-on-error: true  # Warnung, kein Fehler

  # ── Security: Dependency Audit ────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Rust audit (cargo-audit)
        uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
