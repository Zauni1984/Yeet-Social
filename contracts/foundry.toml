[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.24"
optimizer       = true
optimizer_runs  = 200
via_ir          = false

[rpc_endpoints]
chapel  = "https://data-seed-prebsc-1-s1.binance.org:8545"
bsc     = "https://bsc-dataseed.binance.org"

[etherscan]
chapel = { key = "${BSCSCAN_API_KEY}", url = "https://api-testnet.bscscan.com/api" }
bsc    = { key = "${BSCSCAN_API_KEY}", url = "https://api.bscscan.com/api" }

[fmt]
line_length   = 100
tab_width     = 4
bracket_spacing = true

[fuzz]
runs = 256