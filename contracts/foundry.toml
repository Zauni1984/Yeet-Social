[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.24"
optimizer       = true
optimizer_runs  = 200

[rpc_endpoints]
# BNB Smart Chain Testnet (Chain ID: 97)
bsc_testnet = "https://bsc-testnet-dataseed.bnbchain.org"
# BNB Smart Chain Mainnet (Chain ID: 56)  
bsc_mainnet = "https://bsc-dataseed.bnbchain.org"
# Backup RPC endpoints
bsc_testnet_2 = "https://data-seed-prebsc-1-s1.bnbchain.org:8545"
bsc_testnet_3 = "https://data-seed-prebsc-2-s1.bnbchain.org:8545"

[etherscan]
bsc_testnet = { key = "${BSCSCAN_API_KEY}", url = "https://api-testnet.bscscan.com/api" }
bsc_mainnet = { key = "${BSCSCAN_API_KEY}", url = "https://api.bscscan.com/api" }

[fmt]
line_length     = 100
tab_width       = 4
bracket_spacing = true

[fuzz]
runs = 256