version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: yeet-postgres
    restart: always
    environment:
      POSTGRES_DB: yeet
      POSTGRES_USER: yeet
      POSTGRES_PASSWORD: yeet_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yeet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yeet-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - yeet-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: yeet-adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - yeet-net

  web:
    image: nginx:alpine
    container_name: yeet-web
    restart: always
    ports:
      - "80:80"
    networks:
      - yeet-net

networks:
  yeet-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
