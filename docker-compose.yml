services:

  postgres:
    image: postgres:16-alpine
    container_name: yeet-postgres
    restart: unless-stopped
    command: postgres -h 0.0.0.0
    environment:
      POSTGRES_DB: yeet
      POSTGRES_USER: yeet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [yeet-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeet -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose: ["5432"]

  redis:
    image: redis:7-alpine
    container_name: yeet-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [yeet-net]
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  backend:
    image: ghcr.io/zauni1984/yeet-social/backend:main
    container_name: yeet-backend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://yeet:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD missing in .env}@yeet-postgres:5432/yeet"
      REDIS_URL: "redis://yeet-redis:6379"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET missing in .env}
      RUST_LOG: ${RUST_LOG:-backend=info,tower_http=warn}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://justyeet.it}
    networks: [yeet-net]
    ports:
      - "127.0.0.1:8080:8080"

  nginx:
    image: nginx:alpine
    container_name: yeet-nginx
    restart: unless-stopped
    volumes:
      - /root/yeet-html:/usr/share/nginx/html:ro
      - /root/yeet-nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    networks: [yeet-net]

networks:
  yeet-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
