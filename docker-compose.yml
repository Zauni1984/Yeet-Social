services:

  postgres:
    image: postgres:16-alpine
    container_name: yeet-postgres
    restart: unless-stopped
    command: postgres -h 0.0.0.0
    environment:
      POSTGRES_DB: yeet
      POSTGRES_USER: yeet
      POSTGRES_PASSWORD: "YeetDB_5254a44ceae0a4a7!"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [yeet-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeet -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose: ["5432"]

  redis:
    image: redis:7-alpine
    container_name: yeet-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks: [yeet-net]
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  backend:
    image: ghcr.io/zauni1984/yeet-social/backend:main
    container_name: yeet-backend
    restart: unless-stopped
    pull_policy: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://yeet:YeetDB_5254a44ceae0a4a7!@yeet-postgres:5432/yeet"
      REDIS_URL: "redis://yeet-redis:6379"
      JWT_SECRET: "f270e9a02377765cf70ac4ccf1e35af55be8e7d3bac3c71e08e5e17eed62a6c2310d8a24b3d23e4d"
      RUST_LOG: "backend=info,tower_http=warn"
    networks: [yeet-net]
    ports:
      - "127.0.0.1:8080:8080"

  nginx:
    image: nginx:alpine
    container_name: yeet-nginx
    restart: unless-stopped
    entrypoint: >
      sh -c "
        apk add --no-cache curl &&
        curl -sL https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/nginx.conf -o /etc/nginx/nginx.conf &&
        curl -sL https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/index.html -o /usr/share/nginx/html/index.html &&
        nginx -g 'daemon off;'
      "
    ports:
      - "80:80"
    networks: [yeet-net]

networks:
  yeet-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
