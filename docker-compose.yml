version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: yeet-postgres
    restart: always
    environment:
      POSTGRES_DB: yeet
      POSTGRES_USER: yeet
      POSTGRES_PASSWORD: yeet_secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - yeet-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yeet-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - yeet-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    image: ghcr.io/zauni1984/yeet-social/backend:main
    container_name: yeet-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://yeet:yeet_secure_password@postgres:5432/yeet
      REDIS_URL: redis://redis:6379
      BSC_RPC_URL: https://bsc-dataseed.binance.org/
      YEET_TOKEN_ADDRESS: "0x0000000000000000000000000000000000000000"
      YEET_NFT_ADDRESS: "0x0000000000000000000000000000000000000000"
      JWT_SECRET: yeet_jwt_secret_change_in_production
      PORT: "8080"
      RUST_LOG: backend=info,tower_http=warn
    networks:
      - yeet-net
    ports:
      - "8081:8080"

  frontend:
    image: ghcr.io/zauni1984/yeet-social/frontend:main
    container_name: yeet-frontend
    restart: always
    networks:
      - yeet-net
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    container_name: yeet-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - yeet-net

  adminer:
    image: adminer:latest
    container_name: yeet-adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - yeet-net

networks:
  yeet-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
