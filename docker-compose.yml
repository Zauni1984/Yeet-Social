version: "3.9"

# ============================================================
#  Yeet Social — Hostinger Docker Manager
#  Deploy URL:
#  https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/docker-compose.yml
#
#  ENV VARS im Hostinger Docker Manager eintragen:
#    POSTGRES_PASSWORD=dein_sicheres_passwort
# ============================================================

services:

  postgres:
    image: postgres:16-alpine
    container_name: yeet-postgres
    restart: always
    environment:
      POSTGRES_DB: yeet
      POSTGRES_USER: yeet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yeet_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [yeet-net]
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yeet-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [yeet-net]
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: yeet-adminer
    restart: always
    ports:
      - "8080:8080"
    networks: [yeet-net]
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: yeet-web
    restart: always
    ports:
      - "80:80"
    networks: [yeet-net]

networks:
  yeet-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
```

**4.** Oben rechts **"Commit changes"** klicken → **"Commit directly to main"** → bestätigen

**5.** Dann im Hostinger Docker Manager:**"Compose from URL"** klicken und diese URL einfügen:
```
https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/docker-compose.yml
```

**6.** Als Environment Variable eintragen:
```
POSTGRES_PASSWORD=dein_sicheres_passwort
