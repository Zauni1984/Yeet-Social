version: "3.9"

# Yeet Social Media — Production
# VPS: 76.13.150.206 | Hostinger Docker Manager
# Deploy: git push origin main  →  GitHub Actions  →  Hostinger API

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: yeet-postgres
    restart: always
    environment:
      POSTGRES_DB: yeet
      POSTGRES_USER: yeet
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [yeet-net]
    expose: ["5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: yeet-redis
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [yeet-net]
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── Backend (Rust/Axum) ──────────────────────────────────────────────────────
  backend:
    image: ghcr.io/zauni1984/yeet-social/backend:main
    container_name: yeet-backend
    restart: always
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      BSC_RPC_URL: ${BSC_RPC_URL}
      YEET_TOKEN_ADDRESS: ${YEET_TOKEN_ADDRESS:-0x0000000000000000000000000000000000000000}
      YEET_NFT_ADDRESS: ${YEET_NFT_ADDRESS:-0x0000000000000000000000000000000000000000}
      JWT_SECRET: ${JWT_SECRET}
      REWARDS_MINTER_PRIVKEY: ${REWARDS_MINTER_PRIVKEY:-}
      PORT: 8080
      RUST_LOG: ${RUST_LOG:-backend=info,tower_http=warn}
    networks: [yeet-net]
    ports:
      - "8080:8080"

  # ── Frontend (Leptos WASM) ───────────────────────────────────────────────────
  frontend:
    image: ghcr.io/zauni1984/yeet-social/frontend:main
    container_name: yeet-frontend
    restart: always
    networks: [yeet-net]
    ports:
      - "80:80"

networks:
  yeet-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
