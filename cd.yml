name: CD — Deploy

on:
  push:
    branches: [develop]   # develop → BSC Testnet + Staging
  push:
    branches: [main]      # main    → BSC Mainnet + Production

# Nur ein Deployment gleichzeitig pro Umgebung
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:

  # ── Entscheide Umgebung ───────────────────────────────────────────────────
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.name }}
      bsc_rpc:     ${{ steps.env.outputs.bsc_rpc }}
      chain_id:    ${{ steps.env.outputs.chain_id }}

    steps:
      - id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=production"                                    >> $GITHUB_OUTPUT
            echo "bsc_rpc=https://bsc-dataseed.binance.org/"         >> $GITHUB_OUTPUT
            echo "chain_id=56"                                        >> $GITHUB_OUTPUT
          else
            echo "name=staging"                                       >> $GITHUB_OUTPUT
            echo "bsc_rpc=https://data-seed-prebsc-1-s1.binance.org:8545/" >> $GITHUB_OUTPUT
            echo "chain_id=97"                                        >> $GITHUB_OUTPUT
          fi

  # ── Smart Contracts deployen (nur wenn Contracts geändert) ───────────────
  deploy-contracts:
    name: Deploy Contracts → BSC
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}

    # Nur deployen wenn Solidity-Dateien geändert wurden
    if: |
      contains(github.event.head_commit.modified, 'contracts/') ||
      contains(github.event.head_commit.added, 'contracts/')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Deploy YeetToken + YeetNFT
        working-directory: contracts
        env:
          PRIVATE_KEY:        ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          TEAM_WALLET:        ${{ secrets.TEAM_WALLET }}
          ECOSYSTEM_WALLET:   ${{ secrets.ECOSYSTEM_WALLET }}
          LIQUIDITY_WALLET:   ${{ secrets.LIQUIDITY_WALLET }}
          REWARDS_MINTER:     ${{ secrets.REWARDS_MINTER_ADDRESS }}
          BSCSCAN_API_KEY:    ${{ secrets.BSCSCAN_API_KEY }}
        run: |
          forge script script/Deploy.s.sol:DeployYeet \
            --rpc-url ${{ needs.setup.outputs.bsc_rpc }} \
            --broadcast \
            --verify \
            --chain-id ${{ needs.setup.outputs.chain_id }} \
            -vvvv 2>&1 | tee deploy-output.txt

          # Extrahiere Contract-Adressen aus Output
          TOKEN=$(grep "YeetToken:" deploy-output.txt | awk '{print $2}')
          NFT=$(grep "YeetNFT:"   deploy-output.txt | awk '{print $2}')
          echo "YEET_TOKEN_ADDRESS=$TOKEN" >> $GITHUB_ENV
          echo "YEET_NFT_ADDRESS=$NFT"   >> $GITHUB_ENV
          echo "✅ YeetToken: $TOKEN"
          echo "✅ YeetNFT:   $NFT"

      - name: Save contract addresses as artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-addresses-${{ needs.setup.outputs.environment }}
          path: contracts/broadcast/

  # ── Backend Docker Build + Push ───────────────────────────────────────────
  build-backend:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend Build + Push ─────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (WASM)
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.4.0
        with:
          version: latest

      - name: Build WASM frontend
        working-directory: frontend
        run: trunk build --release
        env:
          API_URL: ${{ needs.setup.outputs.environment == 'production' && 'https://api.yeet.social/api/v1' || 'https://api.staging.yeet.social/api/v1' }}

      - name: Docker meta (frontend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Server Deployment via SSH ─────────────────────────────────────────────
  deploy-server:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [setup, build-backend, build-frontend]
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: ${{ needs.setup.outputs.environment == 'production' && 'https://yeet.social' || 'https://staging.yeet.social' }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          port:     ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/yeet

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export BACKEND_IMAGE=ghcr.io/${{ github.repository }}/backend:${{ github.ref_name }}
            export FRONTEND_IMAGE=ghcr.io/${{ github.repository }}/frontend:${{ github.ref_name }}
            docker pull $BACKEND_IMAGE
            docker pull $FRONTEND_IMAGE

            # Zero-downtime rolling restart
            docker compose up -d --no-deps --scale backend=2 backend
            sleep 15
            docker compose up -d --no-deps --scale backend=1 backend

            docker compose up -d --no-deps frontend
            docker compose up -d nginx

            # Run DB migrations on new backend
            docker compose exec -T backend \
              sqlx migrate run --database-url $DATABASE_URL

            # Cleanup old images
            docker image prune -f

            echo "✅ Deployment complete: $(date)"

      - name: Smoke test
        run: |
          URL=${{ needs.setup.outputs.environment == 'production' && 'https://api.yeet.social' || 'https://api.staging.yeet.social' }}
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL/api/v1/feed)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying..."
            sleep 10
          done
          echo "❌ Smoke test failed"
          exit 1

  # ── Deployment Summary ────────────────────────────────────────────────────
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [setup, deploy-server]
    if: always()

    steps:
      - name: Post deployment status
        run: |
          STATUS="${{ needs.deploy-server.result }}"
          ENV="${{ needs.setup.outputs.environment }}"
          SHA="${{ github.sha }}"
          ACTOR="${{ github.actor }}"

          if [ "$STATUS" = "success" ]; then
            echo "✅ $ENV deployment succeeded"
            echo "Commit: ${SHA:0:7} by $ACTOR"
          else
            echo "❌ $ENV deployment FAILED"
            echo "Commit: ${SHA:0:7} by $ACTOR"
            exit 1
          fi
