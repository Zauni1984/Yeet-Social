# cargo-audit config — keep in sync with .github/workflows/security.yml.
# Each ignored advisory is transitive and not reachable/exploitable in our
# usage (rationale in the workflow). Re-review on every dependency bump.
[advisories]
ignore = [
    "RUSTSEC-2024-0363", # sqlx 0.7.4 >4GiB smuggling — mitigated by input caps; TODO upgrade to >=0.8.1
    "RUSTSEC-2023-0071", # rsa Marvin — via unused sqlx-mysql; no fix exists
    "RUSTSEC-2025-0009", # ring 0.16 AES panic — debug/overflow-checks only
    "RUSTSEC-2024-0421", # idna 0.5 punycode — transitive, not a trust check here
    "RUSTSEC-2026-0098", # rustls-webpki URI name constraints — needs misissuance
    "RUSTSEC-2026-0099", # rustls-webpki wildcard name constraints — needs misissuance
    "RUSTSEC-2026-0104", # rustls-webpki CRL parse panic — needs CRL usage
]
