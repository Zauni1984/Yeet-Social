worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend {
        server yeet-backend:8080;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name justyeet.it www.justyeet.it;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name justyeet.it www.justyeet.it;

        ssl_certificate     /etc/letsencrypt/live/justyeet.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/justyeet.it/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Allow image uploads (base64 of a 5 MB image ≈ 6.7 MB)
        client_max_body_size 10M;

        # API -> Rust backend
        # WebSocket upgrade for the messaging realtime channel.
        # Needs Connection/Upgrade headers and a long read timeout so
        # idle sockets don't get reaped by nginx between heartbeats.
        location = /api/v1/ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 30s;
            proxy_read_timeout    3600s;
            proxy_send_timeout    3600s;
        }

        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Uploaded media (avatars, covers) served by the backend
        location /uploads/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
            expires 1h;
        }

        # Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            # Force the browser to revalidate the SPA shell on every load,
            # otherwise users keep seeing stale builds for hours after a
            # deploy. ETag still handles 304s so the byte cost is minimal.
            add_header Cache-Control "no-cache, must-revalidate" always;
        }
    }
}
