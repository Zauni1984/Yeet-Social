worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream backend {
        server yeet-backend:8080;
    }

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name justyeet.it www.justyeet.it;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name justyeet.it www.justyeet.it;

        ssl_certificate     /etc/letsencrypt/live/justyeet.it/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/justyeet.it/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Allow image uploads (base64 of a 5 MB image ≈ 6.7 MB)
        client_max_body_size 10M;

        # API -> Rust backend
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Uploaded media (avatars, covers) served by the backend
        location /uploads/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_cache_valid 200 1h;
            expires 1h;
        }

        # Frontend
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
