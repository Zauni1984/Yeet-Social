name: CD — Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS (76.13.150.206)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: production
      url: https://justyeet.it

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.150.206
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            echo "[CD] $(date) — Starting deploy"
            DEPLOY_DIR=/root/yeet-social
            mkdir -p $DEPLOY_DIR

            # Pull latest configs
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/docker-compose.yml" -o $DEPLOY_DIR/docker-compose.yml
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/nginx.conf" -o $DEPLOY_DIR/nginx.conf

            # Ensure .env exists
            if [ ! -f $DEPLOY_DIR/.env ]; then
              echo "ERROR: $DEPLOY_DIR/.env missing! Create it on the VPS first."
              exit 1
            fi

            cd $DEPLOY_DIR

            # Pull latest backend image
            docker pull ghcr.io/zauni1984/yeet-social/backend:main || true

            # Start/update stack
            docker compose up -d --remove-orphans

            # Sync frontend into named volume
            docker run --rm -v yeet-social_frontend_data:/html alpine sh -c \
              "wget -qO /html/index.html https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/index.html"

            # Health check
            sleep 15
            STATUS=$(curl -sk http://127.0.0.1:8080/api/v1/health 2>/dev/null || echo "error")
            echo "[CD] Health: $STATUS"
            docker ps --format "table {{.Names}}\t{{.Status}}"
            echo "[CD] Done: $(date)"
