name: CD — Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS (76.13.150.206)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: production
      url: https://justyeet.it

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.150.206
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            echo "[CD] Starting deploy at $(date)"

            DEPLOY_DIR=/docker/yeet-social

            # Pull latest compose from GitHub
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/docker-compose.yml" \
              -o $DEPLOY_DIR/docker-compose.yml

            # Pull nginx config
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/nginx.conf" \
              -o $DEPLOY_DIR/nginx.conf

            # Pull latest backend image
            docker pull ghcr.io/zauni1984/yeet-social/backend:main || echo "No new image"

            # Recreate postgres if command changed (TCP fix)
            cd $DEPLOY_DIR
            docker compose up -d --force-recreate postgres
            echo "[CD] Waiting for postgres to be healthy..."
            sleep 10

            # Restart backend with new image
            docker compose up -d --no-deps --pull always backend

            # Sync frontend files
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/index.html" \
              -o /home/yeet-frontend/index.html
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/sw.js" \
              -o /home/yeet-frontend/sw.js 2>/dev/null || true
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/manifest.json" \
              -o /home/yeet-frontend/manifest.json 2>/dev/null || true

            # Health check
            sleep 8
            STATUS=$(curl -sk http://127.0.0.1:8080/api/v1/health | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('status','error'))" 2>/dev/null || echo "error")
            echo "[CD] Health: $STATUS"

            echo "[CD] Deploy complete at $(date)"
