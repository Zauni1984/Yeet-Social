name: CD — Deploy to Hostinger VPS

on:
  push:
    branches: [main]
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS (76.13.150.206)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment:
      name: production
      url: https://justyeet.it

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.150.206
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 300s
          script: |
            set -e
            echo "[CD] Starting deploy at $(date)"

            # Find compose dir dynamically
            DEPLOY_DIR=$(find / -name "docker-compose.yml" -not -path "*/overlay2/*" -not -path "*/proc/*" -not -path "*/root/Yeet/*" -not -path "*/opt/yeet/*" 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo "")
            echo "[CD] Found compose at: $DEPLOY_DIR"

            if [ -z "$DEPLOY_DIR" ]; then
              echo "[CD] No compose dir found, using /root/yeet-social"
              DEPLOY_DIR=/root/yeet-social
              mkdir -p $DEPLOY_DIR
            fi

            # Pull latest compose and nginx config
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/docker-compose.yml" -o $DEPLOY_DIR/docker-compose.yml
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/nginx.conf" -o $DEPLOY_DIR/nginx.conf

            # Show .env if exists
            ls -la $DEPLOY_DIR/

            cd $DEPLOY_DIR

            # Force-recreate postgres with TCP fix, then restart backend
            docker compose up -d --force-recreate postgres
            echo "[CD] Waiting for postgres..."
            sleep 12

            docker compose up -d --no-deps --pull always backend

            # Sync frontend
            mkdir -p /home/yeet-frontend
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/index.html" -o /home/yeet-frontend/index.html
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/sw.js" -o /home/yeet-frontend/sw.js 2>/dev/null || true
            curl -sL "https://raw.githubusercontent.com/Zauni1984/Yeet-Social/main/frontend/manifest.json" -o /home/yeet-frontend/manifest.json 2>/dev/null || true

            sleep 8
            STATUS=$(curl -sk http://127.0.0.1:8080/api/v1/health 2>/dev/null || echo "no-response")
            echo "[CD] Health response: $STATUS"
            echo "[CD] Deploy complete at $(date)"
