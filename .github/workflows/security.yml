name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Read-only token: we run cargo-audit directly and print findings to the log
# instead of opening GitHub issues, so no write permission is needed. This
# also avoids the "Resource not accessible by integration" failure the
# rustsec/audit-check action hit when it tried to POST an issue.
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --quiet 2>/dev/null || true

      # Ignore list — each entry is transitive and not reachable/exploitable in
      # our usage; re-review on every dependency bump. New, non-ignored
      # advisories still fail the job.
      #
      #  RUSTSEC-2024-0363  sqlx 0.7.4 — >4 GiB value protocol smuggling.
      #    Mitigated: all inputs are tiny (posts ≤280 chars; uploads capped at
      #    10 MB by nginx client_max_body_size). TODO: upgrade sqlx to ≥0.8.1.
      #  RUSTSEC-2023-0071  rsa (Marvin timing) — pulled only via sqlx-mysql,
      #    which we don't use (Postgres only). No fixed version exists.
      #  RUSTSEC-2025-0009  ring 0.16 AES panic — only with overflow-checks
      #    (debug); release builds unaffected. Transitive.
      #  RUSTSEC-2024-0421  idna 0.5 punycode — transitive; not used for any
      #    security-relevant host comparison here.
      #  RUSTSEC-2026-0098/0099/0104  rustls-webpki 0.101 — CRL/name-constraint
      #    issues reachable only with CRLs / misissued certs; transitive via TLS
      #    stack, not in our trust-decision path.
      - name: cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2024-0363 \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2025-0009 \
            --ignore RUSTSEC-2024-0421 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104
