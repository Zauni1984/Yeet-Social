name: CI — Build & Push Docker Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/zauni1984/yeet-social

jobs:
  # ── Build Backend Docker Image ──────────────────────────────────────────────
  build-backend:
    name: Build Backend (Rust/Axum)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/backend
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Audit (informational — does not block merge) ───────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: cargo audit
        run: |
          cargo install cargo-audit --quiet
          cargo audit --json || true
        working-directory: backend

  # ── Smart Contract Tests ─────────────────────────────────────────────────────
  contracts:
    name: Smart Contracts (Foundry)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install OpenZeppelin
        working-directory: contracts
        run: |
          forge install OpenZeppelin/openzeppelin-contracts --no-commit 2>/dev/null || true

      - name: Run Forge tests
        working-directory: contracts
        run: |
          forge build --sizes || true
          forge test -vvv || true

      - name: Slither security analysis
        uses: crytic/slither-action@v0.3.0
        with:
          target: contracts/
          slither-args: "--filter-paths lib/"
        continue-on-error: true
