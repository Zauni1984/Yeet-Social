name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    name: Build Backend (Rust/Axum)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: yeet
          POSTGRES_PASSWORD: yeet_secure_password
          POSTGRES_DB: yeet
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://yeet:yeet_secure_password@localhost:5432/yeet
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true
      - name: Build
        run: cargo build --release
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: ghcr.io/zauni1984/yeet-social/backend:ci

  smart-contracts:
    name: Smart Contracts (Foundry  BNB Smart Chain)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Install dependencies
        run: |
          git clone --depth 1 https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
          git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
      - name: Build
        run: forge build
      - name: Test
        run: forge test -v

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit
        run: cargo audit || true
