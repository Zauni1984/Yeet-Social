name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-backend:
    name: Build & Push Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yeet
          POSTGRES_PASSWORD: yeet_secure_password
          POSTGRES_DB: yeet
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://yeet:yeet_secure_password@localhost:5432/yeet
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: true

      - name: Run Migrations
        run: |
          cargo install sqlx-cli --no-default-features --features postgres --quiet 2>/dev/null || true
          sqlx migrate run

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: ghcr.io/zauni1984/yeet-social/backend:main
          network: host
          build-args: |
            DATABASE_URL=postgresql://yeet:yeet_secure_password@localhost:5432/yeet
